name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build session-mimic
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o session-mimic-${{ matrix.goos }}-${{ matrix.goarch }} main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: session-mimic-${{ matrix.goos }}-${{ matrix.goarch }}
          path: session-mimic-${{ matrix.goos }}-${{ matrix.goarch }}
